name: Auto PR Review

on:
  pull_request:
    types: [opened]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Code Review
        id: claude-code-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Be constructive and helpful in your feedback. Always post a
            summary comment on the PR, even if you have no issues to report
            (e.g. "No issues found, this looks good!").

          # Use the `settings` input (JSON) instead of --allowed-tools in
          # claude_args. claude_args is parsed by splitting on whitespace,
          # which breaks tool patterns like "Bash(gh issue view:*)" that
          # contain spaces (see anthropics/claude-code-action#844). The
          # settings JSON is not affected by that bug.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(gh issue view:*)",
                  "Bash(gh search:*)",
                  "Bash(gh issue list:*)",
                  "Bash(gh pr comment:*)",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr view:*)",
                  "Bash(gh pr list:*)",
                  "mcp__github_inline_comment__create_inline_comment",
                  "mcp__github_comment__update_claude_comment",
                  "mcp__github_comment__update_claude_comment",
                  "mcp__github__create_pending_pull_request_review",
                  "mcp__github__add_pull_request_review_comment_to_pending_review",
                  "mcp__github__submit_pending_pull_request_review",
                  "mcp__github__get_pull_request_diff"
                ]
              }
            }

          # Supply remaining CLI flags that don't contain spaces - these are
          # safe to pass via claude_args.
          claude_args: |
            --model sonnet

          # Use sticky comments to make Claude reuse the same comment on subsequent pushes to the same PR
          # use_sticky_comment: true
          track_progress: true
          classify_inline_comments: false
