name: anthropic-wif-auth-test
on:
  pull_request:
    types:
      - opened
permissions:
  id-token: write
  contents: read
jobs:
  call-claude:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch GitHub OIDC token
        uses: actions/github-script@v8
        with:
          script: |
            const token = await core.getIDToken('https://api.anthropic.com');
            core.setSecret(token);
            core.exportVariable('JWT', token);
      - name: Exchange for an Anthropic access token
        run: |
          curl -sS https://api.anthropic.com/v1/oauth/token \
            -H "content-type: application/json" \
            --data @- <<JSON | jq 'with_entries(if (.key | test("token$")) then .value = "<redacted>" else . end)'
          {
            "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
            "assertion": "$JWT",
            "federation_rule_id": "fdrl_01EqUgCdzeC3uZpsFi5sXWTH",
            "organization_id": "943ac73e-feda-4f07-85ed-47bc3fb51046",
            "service_account_id": "svac_012yopguQg96SC7mhBAZwVGE",
            "workspace_id": "wrkspc_01AoVvQnMf4B7KFHwG4XKz1W"
          }
          JSON
